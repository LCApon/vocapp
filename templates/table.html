<table class="table table-hover table-striped table-dark table-rounded table-bordered">
    <thead>
        <tr>
            {% for col in columns %}
            <th scope="col">{{ col }}</th>
            {% endfor %}
            <th scope="col">Add to review</th>
        </tr>
    </thead>
    <tbody class="table-group-divider">
        {% for row in rows %}
        <tr>
            {% for col in columns %}
            <td>{{ row[col] | safe}}</td>
            {% endfor %}
            <td>
                <button class="btn btn-outline-light add-review-btn {{ 'active no-click' if row.isActive else ''}}"
                    data-id-lexeme="{{ row.idLexeme }}" data-id-word="{{ row.idWord }}" data-id-sense="{{ row.idSense }}"
                    data-bs-toggle="button" aria-pressed="{{ 'true' if row.isActive else 'false'}}"
                >
                    {{ 'Added' if row.isActive else 'Add' }}
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
