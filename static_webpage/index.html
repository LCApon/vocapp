<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vocapp</title>

    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">

    <!-- Bootstrap & FA -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Personal style -->
    <style>
        :root {
            --highlight: #b7fe34;
        }

        table.table {
            max-width: 100%;
        }

        .maxWidth {
            max-width:1200px;
        }

        .offsetTop {
            padding-top: 1em;
        }

        .offsetBottom {
            padding-bottom: .5em;
        }

        .mgBottom {
            margin-bottom: .2rem;
        }

		.table-rounded {
			border-radius: 1em;
			overflow: hidden;
		}

        .no-click {
            pointer-events: none;
        }

        .no-focus-outline:focus {
            outline: none;
            box-shadow: none;
        }
    </style>
</head>

<!-- Body ----------------------------------------------------------------------------------------------------------->
<body>
<div class="container-fluid maxWidth">

    <div class="row offsetTop">
        <h1>Vocapp</h1>
    </div>

    <!-- Review words -->
    <div class="row offsetTop">
        <div class="col">
            <div class="row">
                <h2 class="col">Review words</h2>
                <div class="col">
                    <button class="btn btn-outline-dark p-1 float-end" style="font-size: 13px" onclick="reschedule_review(currentIdReview)">Reschedule</button>
                </div>
            </div>
            <div class="row offsetTop">
                <div id="review-content" class="col">
                    <div hidden id="review-card" class="card bg-dark text-white text-center mx-auto" style="max-width: 22em; border-radius: 1em;">
                        <div class="card-header">
                            <ul class="nav nav-pills card-header-pills">
                                <li class="nav-item col">
                                    <button hidden id="btn-rating-again" type="button" class="btn btn-outline-light" onclick="rateCard(1)"><i class="fas fa-redo"></i></button>
                                </li>
                                <li class="nav-item col">
                                    <p id="review-pos" style='color:var(--highlight);'></p>
                                </li>
                                <li class="nav-item col">
                                    <button hidden id="btn-edit-data" type="button" class="btn btn-outline-light" onclick="toggleEditEntryReview()" data-bs-toggle="button" aria-pressed="false"><i class="fas fa-edit"></i></button>
                                </li>
                            </ul>
                        </div>
                        <div class="card-body">
                            <h4 id="review-prompt" class="card-title py-1"></h4>
                            <h6 id="review-note" class="fst-italic fw-light"></h6>
                            <hr></hr>
                            <button id="btn-review-show" type="button" class="btn btn-light py-1" onclick="show_review()">Show</button>
                            <h5 hidden id="review-answer" class="card-subtitle py-1" style="font-weight:normal"></h5>
                            <div hidden id="btn-review-rating" class="btn-group btn-group-lg offsetTop" role="group" aria-label="Rating buttons">
                                <button type="button" class="btn btn-danger" onclick="rateCard(2)">Hard</button>
                                <button type="button" class="btn btn-primary" onclick="rateCard(3)">Good</button>
                                <button type="button" class="btn btn-success" onclick="rateCard(4)">Easy</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div hidden id="review-edit" class="col">
                    <form>
                        <div class="form-group">
                            <label for="form-review-lexeme">Lexeme, word and sense</label>
                            <input id="form-review-lexeme" class="form-control" type="text" placeholder="Lexeme">
                            <input id="form-review-word" class="form-control" type="text" placeholder="Word">
                            <textarea id="form-review-sense" class="form-control" placeholder="Sense" rows="1"></textarea>
                            <textarea id="form-review-note" class="form-control" placeholder="Note" rows="1"></textarea>

                            <label for="form-review-example-sentence">Example sentence</label>
                            <textarea id="form-review-example-sentence" class="form-control" placeholder="Example sentence" rows="1"></textarea>
                            <textarea id="form-review-example-translation" class="form-control" placeholder="Example translation" rows="1"></textarea>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="editEntryReview()">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Word search -->
    <div class="row offsetTop">
        <div class="col">
            <h2>Word search</h2>
            <div class="input-group">
                <div class="input-group-text p-0">
                    <select id="languageWordLookup" class="form-select bg-light border-0 no-focus-outline">
                    </select>
                </div>
    
                <input type="text" class="form-control" style="min-width:100px" id="inputWordLookup" placeholder="Word, e.g. 勉強" onkeydown="if(event.key === 'Enter') lookupWord()">
                <button class="input-group-text btn btn-dark" onclick="lookupWord()"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </div>

    <div id="lookup-results" class="row offsetTop"></div>

    <!-- Add entries to database -->
    <div class="row offsetTop">
        <div class="col">
            <div class="row">
                <h2>Add words</h2>
            </div>
            <form id="form-add-entry" role="form" class="pt-3">
                <div class="form-group row">
                    <select id="form-add-iso639" class="col form-select bg-light border-0 no-focus-outline mgBottom" required>
                    </select>
                    <select id="form-add-sense-pos" class="col form-select bg-light border-0 no-focus-outline mgBottom" required>
                    </select>
                </div>
                <div class="form-group row">
                    <div class="col">
                        <label for="form-add-lexeme">Lexeme, word and sense</label>
                        <input id="form-add-lexeme" class="form-control mgBottom" type="text" placeholder="Lexeme" required>
                        <input id="form-add-word" class="form-control mgBottom" type="text" placeholder="Word (leave empty to use lexeme)">
                        <textarea id="form-add-sense" class="form-control mgBottom" placeholder="Sense" rows="1" required></textarea>
                        <input id="form-add-source" class="form-control mgBottom" type="text" placeholder="Source (optional)">
                    </div>
                    <div class="col">
                        <label for="form-add-example-sentence">Example sentence</label>
                        <textarea id="form-add-example-sentence" class="form-control mgBottom" placeholder="Example sentence" rows="1"></textarea>
                        <textarea id="form-add-example-translation" class="form-control mgBottom" placeholder="Example translation" rows="1"></textarea>
                        <input class="form-check-input" type="checkbox" value="" id="form-add-review" checked>
                        <label class="form-check-label" for="form-add-review">
                            Add to review?
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>

</div>
</body>

<!-- Script ----------------------------------------------------------------------------------------------------------->
<script>
    const API = '/api';
    let currentCard = null;
    let currentIdReview = null;
    let currentIdxReview = 0;
    let cachedReviewDue = null;

    let promptReview;
    let answerReview;
    let noteReview;

    let wordLastSearch = null;

    let currentUTCDate;

    let elWord = document.getElementById('inputWordLookup');
    elWord.value = null;

    // Generic get and post functions
    async function get_html(path) {
        const r = await fetch(API + path);
        return r.ok ? r.text() : null;
    }

    async function post_json(path, body) {
        const r = await fetch(API + path, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });

        return r.ok ? r.json() : null;
    }

    async function get_json(path) {
        const r = await fetch(API + path);
        return r.ok ? r.json() : null;
    }

    // Review page /////////////////////////////////////////////////////////////////////////////////////////////////////

    // Get reviewable cards
    async function getReviews() {
        const data = await get_json('/due');
        const el = document.getElementById('review-content');
        if (!data || data.length === 0) {
            el.innerHTML = '<div>No cards due right now.</div>';
            return;
        }

        cachedReviewDue = data;

        updateCard()
    }

    // Reschedule review(s)
    async function reschedule_review(id) {
        post_json(
            "/reschedule",
            {id: id}
        );
    }

    // Card HTML makeup
    async function updateCard() {
        const el = document.getElementById('review-content');

        if (cachedReviewDue.length > currentIdxReview) {
            dataReview = cachedReviewDue[currentIdxReview];
        } else {
            el.innerHTML = '<div>No more cards due right now.</div>';
            return;
        }

        if (dataReview.typeReview == 1) {
            promptReview = dataReview.lexeme;
            answerReview = dataReview.sense;
            noteReview = dataReview.note ? dataReview.note : "";

        } else if (dataReview.typeReview == 2) {
            promptReview = dataReview.sense;
            answerReview = dataReview.lexeme;
            noteReview = "";
        }

        currentIdReview = dataReview.id;

        // Hide items not shown at start of reviewing card
        const elReviewBtnGroup = document.getElementById('btn-review-rating');
        const elReviewBtnAgain = document.getElementById('btn-rating-again');
        const elReviewBtnEdit = document.getElementById('btn-edit-data');
        const elReviewEdit = document.getElementById('review-edit');
        const elReviewAnswer = document.getElementById('review-answer');

        elReviewBtnGroup.hidden = true;
        elReviewBtnAgain.hidden = true;
        elReviewBtnEdit.hidden = true;
        elReviewEdit.hidden = true;
        elReviewAnswer.hidden = true;

        // Fill card info
        const elReviewPos = document.getElementById('review-pos');
        const elReviewPrompt = document.getElementById('review-prompt');
        const elReviewNote = document.getElementById('review-note');
        
        elReviewPos.innerHTML = dataReview.pos;
        elReviewPrompt.innerHTML = promptReview;
        elReviewNote.innerHTML = noteReview;
        elReviewAnswer.innerHTML = answerReview;

        // Fill edit card info
        const elEditLexeme = document.getElementById('form-review-lexeme');
        const elEditWord = document.getElementById('form-review-word');
        const elEditSense = document.getElementById('form-review-sense');
        const elEditNote = document.getElementById('form-review-note');

        elEditLexeme.value = dataReview.lexeme;
        elEditWord.value = dataReview.word;
        elEditSense.value = dataReview.sense;
        elEditNote.value = noteReview;
        
        // Unhide items shown at start of reviewing card
        const elReviewBtnShow = document.getElementById('btn-review-show');
        const elReviewCard = document.getElementById('review-card');
        
        elReviewBtnShow.hidden = false;
        elReviewCard.hidden = false;

        currentIdxReview = currentIdxReview + 1
    }

    // Show review answer on button click
    async function show_review() {
        const elReviewAnswer = document.getElementById('review-answer');
        const elReviewBtnGroup = document.getElementById('btn-review-rating');
        const elReviewBtnShow = document.getElementById('btn-review-show');
        const elReviewBtnAgain = document.getElementById('btn-rating-again');
        const elReviewBtnEdit = document.getElementById('btn-edit-data');
        
        
        elReviewAnswer.hidden = false;
        elReviewBtnGroup.hidden = false;
        elReviewBtnAgain.hidden = false;
        elReviewBtnEdit.hidden = false;
        elReviewBtnShow.hidden = true;
    };

    // Edit data for card on review
    async function toggleEditEntryReview() {
        const elFormEdit = document.getElementById('review-edit');
        elFormEdit.hidden = !elFormEdit.hidden;
        
        // const elBtnEdit = document.getElementById('btn-edit-data');
        // elBtnEdit.aria.pressed = !elBtnEdit.aria-pressed;

    }
    async function editEntryReview() {
        const elLexeme = document.getElementById('form-review-lexeme');
        const elWord = document.getElementById('form-review-word');
        const elSense = document.getElementById('form-review-sense');
        const elNote = document.getElementById('form-review-note');
        const elExSentence = document.getElementById('form-review-example-sentence');
        const elExTranslation = document.getElementById('form-review-example-translation');

        let example = null
        if (elExSentence & elExTranslation) {
            example = {
                example: elExSentence.value.trim(),
                translation: elExTranslation.value.trim()
            }
        }

        console.log(elNote.value.trim())

        post_json(
            '/update/review',
            {
                idReview: currentIdReview,
                lexeme: elLexeme.value.trim() ? elLexeme.value.trim() : null,
                word: elWord.value.trim() ? elWord.value.trim() : null,
                sense: elSense.value.trim() ? elSense.value.trim() : null,
                note: elNote.value.trim() ? elNote.value.trim() : null,
                example: example
            }
        );

        elLexeme.value = null;
        elWord.value = null;
        elSense.value = null;
        elNote.value = null;
        elExSentence.value = null;
        elExTranslation.value = null;

        toggleEditEntryReview();
    }

    // Rate card-review
    async function rateCard(rating) {
        currentUTCDate = new Date(Date.now()).toISOString();

        post_json(
            "/submit/review",
            {
                idReview: currentIdReview,
                dtReview: currentUTCDate,
                rating: rating
            }
        );

        currentIdReview = null;

        updateCard();
    }

    // Word search /////////////////////////////////////////////////////////////////////////////////////////////////////
    
    // Word lookup
    async function lookupWord() {
        const elWord = document.getElementById('inputWordLookup');
        const lang = document.getElementById('languageWordLookup').value;
        
        const word = elWord.value.trim()

        const el = document.getElementById('lookup-results');
        if (!word) { el.innerHTML = '<div class="result"></div>'; return; }

        let query = ''
        if (lang) query = '?iso639=' + encodeURIComponent(lang)

        const data = await get_html('/search/term/' + encodeURIComponent(word) + query);

        if (!data || data.length === 0) { el.innerHTML = '<div class="result">No results.</div>'; return; }
        tableWordLookup = data;
        el.innerHTML = `<div class="col"><div class="table-responsive">${tableWordLookup}</div></div>`;
        wordLastSearch = word;
        elWord.value = null;
    }

    // Add to review when 'Add' button is clicked
    async function add_to_review(button) {
        const idLexeme = button.dataset.idlexeme;
        const idWord = button.dataset.idword;
        const idSense = button.dataset.idsense;

        const isNowActive = button.classList.contains("active");

        if (isNowActive) {
            // Add row to reviews
            button.classList.add("no-click");
            button.textContent = "Added";

            post_json(
                "/add/review",
                {
                    idSense: idSense
                }
            );
        }
    };

    async function showEditTableRowEntry(data) {
        const id = data.dataset.id;
        const el = document.getElementById(id);
        
        el.hidden = !el.hidden;
    };

    async function editTableRowEntry(data) {
        await post_json(
            "/update/search",
            {
                coltype: data.dataset.coltype,
                idSense: data.dataset.idsense,
                idExample: data.dataset.idexample ? data.dataset.idexample : null,
                valueNew: data.value
            }
        );
        data.value = null;

        const elWordSearch = document.getElementById('inputWordLookup');
        elWordSearch.value = wordLastSearch;
        lookupWord();
    }

    // Add entries /////////////////////////////////////////////////////////////////////////////////////////////////////

    // Add entry
    document.getElementById('form-add-entry').addEventListener('submit', function(event) {
        event.preventDefault(); // stop the page reload

        // Perform built-in validation
        if (!this.checkValidity()) {
            this.reportValidity();
            return;
        }

        addEntry(new FormData(this));
    });

    async function addEntry() {
        const elIso639 = document.getElementById('form-add-iso639');
        const elLexeme = document.getElementById('form-add-lexeme');
        const elWord = document.getElementById('form-add-word');
        const elSense = document.getElementById('form-add-sense');
        const elSensePos = document.getElementById('form-add-sense-pos');
        const elSource = document.getElementById('form-add-source');
        const elExSentence = document.getElementById('form-add-example-sentence');
        const elExTranslation = document.getElementById('form-add-example-translation');
        const elAddToReview = document.getElementById('form-add-review');

        let example = null
        if (elExSentence & elExTranslation) {
            example = {
                example: elExSentence.value.trim(),
                translation: elExTranslation.value.trim()
            }
        }

        r = post_json(
            '/entry/create',
            {
                iso639: elIso639.value,
                lexeme: elLexeme.value.trim(),
                word: elWord.value.trim() ? elWord.value.trim() : elLexeme.value.trim(),
                sense: elSense.value.trim(),
                pos: elSensePos.value,
                source: elSource.value.trim() ? elSource.value.trim() : null,
                example: example,
                addToReview: elAddToReview.checked
            }
        );

        elIso639.selectedIndex = 0;
        elSensePos.selectedIndex = 0;
        elLexeme.value = null;
        elWord.value = null;
        elSense.value = null;
        elSource.value = null;
        elExSentence.value = null;
        elExTranslation.value = null;
    }

    // Run on page load ////////////////////////////////////////////////////////////////////////////////////////////////

    // Get languages for selectors
    async function getLanguagesSelector(){
        
        const elForm = document.getElementById('form-add-iso639');
        const elSearch = document.getElementById('languageWordLookup');

        const optionsSelector = await get_html('/get/languages');

        elForm.innerHTML = optionsSelector;
        elSearch.innerHTML = optionsSelector;
    }

    // Get parts of speech for selector
    async function getPosSelector(){
        const el = document.getElementById('form-add-sense-pos');

        const optionsSelector = await get_html('/get/pos');

        el.innerHTML = optionsSelector;
    }

    getLanguagesSelector()
    getPosSelector()
    getReviews()

</script>
