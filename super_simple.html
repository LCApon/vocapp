<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vocapp</title>

    <!-- CSS Reset -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    </style>

    <!-- Bootstrap & FA -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Personal style -->
    <style>
        :root {
            --highlight: #b7fe34;
        }

        table.table {
            width:auto;
        }

        .maxWidth {
            max-width:1200px;
        }

        .halfWidth {
            max-width:600px;
        }

        .offsetTop {
            padding-top: 2em;
        }

        .offsetBottom {
            padding-bottom: .5em;
        }

		.table-rounded {
			border-radius: 1em;
			overflow: hidden;
		}

        .no-click {
            pointer-events: none;
        }

        .no-focus-outline:focus {
            outline: none;
            box-shadow: none;
        }

        .icon-white {
            font-size: 100px;
            color: white;
        }
    </style>
</head>

<!-- Body ----------------------------------------------------------------------------------------------------------->
<body class="container-fluid maxWidth">

    <div class="container-fluid offsetTop">
        <h1 class="offsetBottom">Vocapp</h1>
        
        <h2>Review words</h2>
        <div id="review">
            <div id="review-content"></div>
        </div>
    </div>

    <div class="container-fluid offsetTop ms-0">
        <h2>Word search</h2>
        <div class="input-group halfWidth">
            <div class="input-group-text p-0">
                <select id="languageWordLookup" class="form-select bg-light border-0 no-focus-outline">
                    <option value="">Language</option>
                    <option value="zh">Chinese</option>
                    <option value="nl">Dutch</option>
                    <option value="jp">Japanese</option>
                    <option value="vi">Vietnamese</option>
                </select>
            </div>

            <input type="text" class="form-control" id="inputWordLookup" placeholder="Word, e.g. 勉強" onkeydown="if(event.key === 'Enter') lookupWord()">
            <button class="input-group-text btn btn-dark" onclick="lookupWord()"><i class="fa fa-search"></i></button>
        </div>

        <div id="lookup-results" class="offsetTop"></div>

    </div>

</body>

<!-- Script ----------------------------------------------------------------------------------------------------------->
<script>
    const API = 'http://localhost:8000/api';
    let currentCard = null;
    let cachedReviewDue = null;

    // Generic get and post functions
    async function get_html(path) {
        const r = await fetch(API + path);
        return r.ok ? r.text() : null;
        // return r.ok ? r.json() : null;
    }

    async function post_json(path, body) {
        const r = await fetch(path, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });

        return r.ok ? r.json() : null;
    }

    async function get_json(path) {
        const r = await fetch(API + path);
        return r.ok ? r.json() : null;
    }

    // Get reviewable cards
    async function getReviews() {
        const data = await get_json('/due');
        const el = document.getElementById('review-content');
        if (!data || data.length === 0) {
            el.innerHTML = '<div>No cards due right now.</div>';
            return;
        }

        sessionStorage.setItem("reviewDue", JSON.stringify(data));
        cachedReviewDue = JSON.parse(localStorage.getItem("reviewDue"));
        el.innerHTML = `<div>${JSON.stringify(data)}</div>`;
    }

    async function lookupWord() {
        const word = document.getElementById('inputWordLookup').value.trim();
        const lang = document.getElementById('languageWordLookup').value;

        const el = document.getElementById('lookup-results');
        if (!word) { el.innerHTML = '<div class="result"></div>'; return; }

        let query = ''
        if (lang) query = '/?iso639=' + encodeURIComponent(lang)

        const data = await get_html('/search/term/' + encodeURIComponent(word) + query);

        if (!data || data.length === 0) { el.innerHTML = '<div class="result">No results.</div>'; return; }
        tableWordLookup = data;
        el.innerHTML = `<div>${tableWordLookup}</div>`;
    }

    // Add to review when 'Add' button is clicked
    document.addEventListener("click", function(event) {
        const btn = event.target.closest(".add-review-btn");
        if (!btn) return;
        console.log("clicked!");
        const idLexeme = btn.dataset.idLexeme;
        const idWord = btn.dataset.idWord;
        const idSense = btn.dataset.idSense;

        const isNowActive = btn.classList.contains("active");

        if (isNowActive) {
            // Add row to reviews
            console.log("Button activated", idLexeme, idWord, idSense);

            btn.classList.add("no-click");
            btn.textContent = "Added";

            post_json(
                API + "/add/review",
                {
                    idSense: idSense
                }
            );
        }
    });

    // Run on page load
    getReviews()
</script>
