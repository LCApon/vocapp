<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vocapp</title>

    <!-- Bootstrap & FA -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Personal style -->
    <style>
        :root {
            --highlight: #b7fe34;
        }

        table.table {
            max-width: 100%;
        }

        .maxWidth {
            max-width:1200px;
        }

        .offsetTop {
            padding-top: 2em;
        }

        .offsetBottom {
            padding-bottom: .5em;
        }

		.table-rounded {
			border-radius: 1em;
			overflow: hidden;
		}

        .no-click {
            pointer-events: none;
        }

        .no-focus-outline:focus {
            outline: none;
            box-shadow: none;
        }
    </style>
</head>

<!-- Body ----------------------------------------------------------------------------------------------------------->
<body>
<div class="container-fluid maxWidth">

    <div class="row offsetTop">
        <h1>Vocapp</h1>
    </div>

    <div class="row offsetTop">
        <div class="col">
            <h2>Review words</h2>
            <div id="review-content">
            </div>
        </div>
    </div>

    <div class="row offsetTop">
        <div class="col">
            <h2>Word search</h2>
            <div class="input-group">
                <div class="input-group-text p-0">
                    <select id="languageWordLookup" class="form-select bg-light border-0 no-focus-outline">
                        <option value="">Language</option>
                        <option value="zh">Chinese</option>
                        <option value="nl">Dutch</option>
                        <option value="jp">Japanese</option>
                        <option value="vi">Vietnamese</option>
                    </select>
                </div>
    
                <input type="text" class="form-control" style="min-width:100px" id="inputWordLookup" placeholder="Word, e.g. 勉強" onkeydown="if(event.key === 'Enter') lookupWord()">
                <button class="input-group-text btn btn-dark" onclick="lookupWord()"><i class="fa fa-search"></i></button>
            </div>
        </div>
    </div>

    <div id="lookup-results" class="row offsetTop"></div>

</div>
</body>

<!-- Script ----------------------------------------------------------------------------------------------------------->
<script>
    const API = 'http://localhost:8000/api';
    let currentCard = null;
    let currentIdReview = null;
    let currentIdxReview = 0;
    let cachedReviewDue = null;

    let promptReview;
    let answerReview;

    let currentUTCDate;

    // Generic get and post functions
    async function get_html(path) {
        const r = await fetch(API + path);
        return r.ok ? r.text() : null;
    }

    async function post_json(path, body) {
        const r = await fetch(API + path, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });

        return r.ok ? r.json() : null;
    }

    async function get_json(path) {
        const r = await fetch(API + path);
        return r.ok ? r.json() : null;
    }

    // Get reviewable cards
    async function getReviews() {
        const data = await get_json('/due');
        const el = document.getElementById('review-content');
        if (!data || data.length === 0) {
            el.innerHTML = '<div>No cards due right now.</div>';
            return;
        }

        cachedReviewDue = data;

        updateCard()
    }

    // Card HTML makeup
    async function updateCard() {
        const el = document.getElementById('review-content');

        if (cachedReviewDue.length > currentIdxReview) {
            dataReview = cachedReviewDue[currentIdxReview];
        } else {
            el.innerHTML = '<div>No more cards due right now.</div>';
            return;
        }

        if (dataReview.is_reverse) {
            promptReview = dataReview.sense;
            answerReview = dataReview.lexeme;
        } else {
            promptReview = dataReview.lexeme;
            answerReview = dataReview.sense;
        }

        currentIdReview = dataReview.id;

        el.innerHTML = `
            <div class="card bg-dark text-white text-center mx-auto" style="max-width: 18rem; border-radius: 1em;">
                <p style='color:var(--highlight);'>${dataReview.pos}</p>
                <div class="card-body">
                    <h4 id="review-from" class="card-title py-1">${promptReview}</h5>
                    <p class="card-text">---------------------------------------</p>
                    <button id="btn-review-show" type="button" class="btn btn-light py-1" onclick="show_review()">Show</button>
                    <h5 hidden id="review-to" class="card-subtitle py-1" style="font-weight:normal">${answerReview}</h5>
                    <div hidden id="btn-review-rating" class="btn-group btn-group-lg offsetTop" role="group" aria-label="Rating buttons">
                        <button type="button" class="btn btn-danger" onclick="rateCard(2)">Hard</button>
                        <button type="button" class="btn btn-primary" onclick="rateCard(3)">Neutral</button>
                        <button type="button" class="btn btn-success" onclick="rateCard(4)">Easy</button>
                    </div>
                </div>
            </div>
        `;

        currentIdxReview = currentIdxReview + 1
    }

    // Rate card-review
    async function rateCard(rating) {
        currentUTCDate = new Date(Date.now()).toISOString();

        post_json(
            "/submit/review",
            {
                idReview: currentIdReview,
                dtReview: currentUTCDate,
                rating: rating
            }
        );

        currentIdReview = null;        
        updateCard();
    }

    // Word lookup
    async function lookupWord() {
        const word = document.getElementById('inputWordLookup').value.trim();
        const lang = document.getElementById('languageWordLookup').value;

        const el = document.getElementById('lookup-results');
        if (!word) { el.innerHTML = '<div class="result"></div>'; return; }

        let query = ''
        if (lang) query = '?iso639=' + encodeURIComponent(lang)

        const data = await get_html('/search/term/' + encodeURIComponent(word) + query);

        if (!data || data.length === 0) { el.innerHTML = '<div class="result">No results.</div>'; return; }
        tableWordLookup = data;
        el.innerHTML = `<div class="col"><div class="table-responsive">${tableWordLookup}</div></div>`;
    }

    // Add to review when 'Add' button is clicked
    async function add_to_review(button) {
        const idLexeme = button.dataset.idlexeme;
        const idWord = button.dataset.idword;
        const idSense = button.dataset.idsense;

        const isNowActive = button.classList.contains("active");

        if (isNowActive) {
            // Add row to reviews
            button.classList.add("no-click");
            button.textContent = "Added";

            post_json(
                "/add/review",
                {
                    idSense: idSense
                }
            );
        }
    };

    // Show review answer on button click
    async function show_review() {
        const elReviewTo = document.getElementById('review-to');
        const elReviewBtnGroup = document.getElementById('btn-review-rating');
        const elReviewBtnShow = document.getElementById('btn-review-show');
        
        elReviewTo.hidden = false
        elReviewBtnGroup.hidden = false
        elReviewBtnShow.hidden = true
    };

    // Run on page load
    getReviews()
</script>
